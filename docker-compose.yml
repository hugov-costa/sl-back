services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: softline_api
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - COMPOSER_HOME=/root/.composer
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - softline-network

  mssql:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: softline_db
    environment:
      SA_PASSWORD: ${DB_PASSWORD}
      ACCEPT_EULA: "Y"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./init.sql:/var/opt/mssql/backup/init.sql:ro
    ports:
      - "1433:1433"
    networks:
      - softline-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${DB_PASSWORD} -No -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 30
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/mssql/bin/sqlservr &
        sleep 15
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${DB_PASSWORD} -No -i /var/opt/mssql/backup/init.sql
        wait

networks:
  softline-network:
    driver: bridge

volumes:
  mssql_data:
